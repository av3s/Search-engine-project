server: 
  port: 8080
spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    username: ${DS_USERNAME}
    password: ${DS_PASSWORD}
    url: jdbc:mysql://${DB_IP}:${DB_PORT}/search_engine?useSSL=false&requireSSL=false&allowPublicKeyRetrieval=true
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    generate-ddl: true
    hibernate.ddl-auto: update
    show-sql: true
indexing-settings:
  sites:
    - url: https://en.wikipedia.org
      name: Wikipedia
    - url: https://www.lenta.ru
      name: Лента.ру
    - url: https://www.skillbox.ru
      name: Skillbox
    - url: https://www.playback.ru
      name: PlayBack.Ru
    - url: https://www.bbc.com
      name: BBC News
    - url: https://stackoverflow.com
      name: Stack Overflow
    - url: https://github.com
      name: GitHub
    - url: https://twitter.com
      name: Twitter
    - url: https://broken-shop.example.com
      name: Broken Shop
    - url: https://test-site.local
      name: Test Site
connection-settings:
  userAgent: Mozilla/10.0 (Windows; U; WindowsNT 5.1; en-US; rv1.8.1.6) Gecko/20070725 Firefox/2.0.0.6
  referrer: https://ya.ru/
  ignoreHttpErrors: true
  followRedirects: false
  timeout_min: 50
  timeout_max: 150
  timeout: 10000